name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-anchor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v1.18.26/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Verify Solana CLI
        run: |
          export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
          solana --version

      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor --tag v0.30.1 anchor-cli --locked
          anchor --version

      - name: Rust fmt
        run: cargo fmt --check

      - name: Rust clippy (programs)
        run: cargo clippy -p sss-stablecoin -p sss-transfer-hook --all-targets -- -D warnings

      - name: Anchor build
        run: anchor build

      - name: Anchor test
        run: RUN_ANCHOR_TESTS=1 anchor test --skip-build

  js-sdk-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install JS deps
        run: pnpm install

      - name: Lint
        run: pnpm -r lint

      - name: Tests
        run: pnpm -r test

  backend-compose-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker compose build
        working-directory: backend
        run: docker compose build
