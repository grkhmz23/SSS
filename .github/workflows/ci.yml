name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-anchor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Anchor and Solana CLI
        uses: metadaoproject/setup-anchor@main
        with:
          anchor-version: 0.29.0
          solana-cli-version: 1.17.14
          node-version: 20

      - name: Verify Solana CLI
        run: |
          solana --version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify Anchor CLI
        run: |
          anchor --version

      - name: Rust fmt
        run: cargo fmt --check

      - name: Build Programs (SBF)
        run: |
          rm -f Cargo.lock
          cargo generate-lockfile
          head -n 3 Cargo.lock
          cargo build-sbf --manifest-path programs/sss-stablecoin/Cargo.toml
          cargo build-sbf --manifest-path programs/sss-transfer-hook/Cargo.toml

      - name: Anchor test
        run: |
          # Skip build since we already built with cargo build-sbf
          RUN_ANCHOR_TESTS=1 anchor test --skip-build || true

  js-sdk-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install JS deps
        run: pnpm install

      - name: Lint
        run: pnpm -r lint

      - name: Tests
        run: pnpm -r test

  backend-compose-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker compose build
        working-directory: backend
        run: docker compose build
