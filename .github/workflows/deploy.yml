name: Deploy to Devnet

on:
  workflow_dispatch:
    inputs:
      cluster:
        description: 'Cluster to deploy to'
        required: true
        default: 'devnet'
        type: choice
        options:
          - devnet
          - mainnet
  push:
    branches:
      - deploy-devnet

env:
  RUST_VERSION: 1.79.0
  SOLANA_VERSION: 1.18.25
  ANCHOR_VERSION: 0.32.1
  CLUSTER: ${{ github.event.inputs.cluster || 'devnet' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
          solana --version

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor --tag v${{ env.ANCHOR_VERSION }} anchor-cli --force

      - name: Setup Solana Wallet
        run: |
          mkdir -p ~/.config/solana
          if [ -n "${{ secrets.DEPLOYER_KEYPAIR }}" ]; then
            echo "${{ secrets.DEPLOYER_KEYPAIR }}" > ~/.config/solana/id.json
          else
            # Create a new wallet if no secret provided (will need funding)
            solana-keygen new --no-passphrase --force -o ~/.config/solana/id.json
            echo "Warning: Using new wallet. Fund this address on devnet:"
            solana address
          fi
          solana config set --url ${{ env.CLUSTER }}
          solana config get

      - name: Check Wallet Balance
        run: |
          BALANCE=$(solana balance 2>/dev/null || echo "0")
          echo "Wallet balance: $BALANCE"
          if [ "$BALANCE" = "0" ] || [ -z "$BALANCE" ]; then
            echo "Warning: Wallet has 0 balance. Deployment may fail."
            echo "Fund this address on devnet: $(solana address)"
          fi

      - name: Verify Anchor CLI
        run: |
          rustc --version
          cargo --version
          anchor --version

      - name: Verify SBF Build Tool
        run: |
          cargo-build-sbf --version
          rustup component add rustfmt

      - name: Anchor build
        run: |
          anchor build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            target/deploy/*.so
            target/idl/*.json

      - name: Deploy to ${{ env.CLUSTER }}
        id: deploy
        run: |
          echo "Deploying to ${{ env.CLUSTER }}..."

          anchor deploy --provider.cluster ${{ env.CLUSTER }}

      - name: Extract and Update Program IDs
        if: env.CLUSTER == 'devnet'
        run: |
          # Get deployed program IDs from keypair files
          SSS_PID=$(solana address -k target/deploy/sss_stablecoin-keypair.json 2>/dev/null || echo "")
          HOOK_PID=$(solana address -k target/deploy/sss_transfer_hook-keypair.json 2>/dev/null || echo "")

          echo "SSS Stablecoin Program: $SSS_PID"
          echo "Transfer Hook Program: $HOOK_PID"

          export SSS_PID
          export HOOK_PID
          python3 - <<'PY'
          from pathlib import Path
          import os

          path = Path("Anchor.toml")
          text = path.read_text()
          lines = text.splitlines()
          in_devnet = False
          for index, line in enumerate(lines):
              stripped = line.strip()
              if stripped == "[programs.devnet]":
                  in_devnet = True
                  continue
              if in_devnet and stripped.startswith("[") and stripped.endswith("]"):
                  in_devnet = False
              if not in_devnet:
                  continue
              if stripped.startswith("sss_stablecoin = ") and os.environ.get("SSS_PID"):
                  lines[index] = f'sss_stablecoin = "{os.environ["SSS_PID"]}"'
              if stripped.startswith("sss_transfer_hook = ") and os.environ.get("HOOK_PID"):
                  lines[index] = f'sss_transfer_hook = "{os.environ["HOOK_PID"]}"'
          path.write_text("\n".join(lines) + "\n")
          PY

          echo "SSS_STABLECOIN_PID=$SSS_PID" >> $GITHUB_ENV
          echo "SSS_TRANSFER_HOOK_PID=$HOOK_PID" >> $GITHUB_ENV

      - name: Commit Updated Program IDs
        if: env.CLUSTER == 'devnet'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Anchor.toml
          git diff --cached --quiet || git commit -m "Update program IDs from devnet deployment [skip ci]"
          git push

      - name: Post Deployment Summary
        run: |
          echo "=== Deployment Complete ==="
          echo "Network: ${{ env.CLUSTER }}"
          echo "SSS Stablecoin: ${{ env.SSS_STABLECOIN_PID || 'See Anchor.toml' }}"
          echo "Transfer Hook: ${{ env.SSS_TRANSFER_HOOK_PID || 'See Anchor.toml' }}"
          echo ""
          echo "To verify:"
          echo "  solana program show ${{ env.SSS_STABLECOIN_PID }} --url ${{ env.CLUSTER }}"
