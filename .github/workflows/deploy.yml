name: Deploy to Devnet

on:
  workflow_dispatch:
    inputs:
      cluster:
        description: 'Cluster to deploy to'
        required: true
        default: 'devnet'
        type: choice
        options:
          - devnet
          - mainnet
  push:
    branches:
      - deploy-devnet

env:
  SOLANA_VERSION: v1.17.14
  ANCHOR_VERSION: 0.29.0
  CLUSTER: ${{ github.event.inputs.cluster || 'devnet' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup Anchor and Solana CLI
        uses: metadaoproject/setup-anchor@main
        with:
          anchor-version: 0.29.0
          solana-cli-version: 1.17.14
          node-version: 20

      - name: Verify Solana CLI
        run: |
          solana --version

      - name: Setup Solana Wallet
        run: |
          mkdir -p ~/.config/solana
          if [ -n "${{ secrets.DEPLOYER_KEYPAIR }}" ]; then
            echo "${{ secrets.DEPLOYER_KEYPAIR }}" > ~/.config/solana/id.json
          else
            # Create a new wallet if no secret provided (will need funding)
            solana-keygen new --no-passphrase --force -o ~/.config/solana/id.json
            echo "Warning: Using new wallet. Fund this address on devnet:"
            solana address
          fi
          solana config set --url ${{ env.CLUSTER }}
          solana config get

      - name: Check Wallet Balance
        run: |
          BALANCE=$(solana balance 2>/dev/null || echo "0")
          echo "Wallet balance: $BALANCE"
          if [ "$BALANCE" = "0" ] || [ -z "$BALANCE" ]; then
            echo "Warning: Wallet has 0 balance. Deployment may fail."
            echo "Fund this address on devnet: $(solana address)"
          fi

      - name: Verify Anchor CLI
        run: |
          anchor --version

      - name: Verify SBF Build Tool
        run: |
          cargo-build-sbf --version
          rustup component add rustfmt

      - name: Build Programs (SBF)
        run: |
          SBF_BIN="$(command -v cargo-build-sbf)"
          test -n "$SBF_BIN"
          SOLANA_CARGO="$(dirname "$SBF_BIN")/sdk/sbf/dependencies/platform-tools/rust/bin/cargo"
          test -n "$SOLANA_CARGO"
          "$SOLANA_CARGO" --version
          rm -f Cargo.lock
          "$SOLANA_CARGO" generate-lockfile
          head -n 3 Cargo.lock
          # Build using cargo-build-sbf which uses the correct toolchain
          cargo build-sbf --manifest-path programs/sss-stablecoin/Cargo.toml
          cargo build-sbf --manifest-path programs/sss-transfer-hook/Cargo.toml
          
          # Copy artifacts to expected location
          mkdir -p target/deploy
          cp target/sbf-solana-solana/release/*.so target/deploy/ || true

      - name: Generate IDL
        run: |
          # Generate IDL using anchor
          anchor idl build --program-name sss_stablecoin --out-file target/idl/sss_stablecoin.json || true
          anchor idl build --program-name sss_transfer_hook --out-file target/idl/sss_transfer_hook.json || true

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            target/deploy/*.so
            target/idl/*.json

      - name: Deploy to ${{ env.CLUSTER }}
        id: deploy
        run: |
          echo "Deploying to ${{ env.CLUSTER }}..."
          
          # Deploy programs using solana CLI directly
          echo "Deploying sss_stablecoin..."
          solana program deploy target/deploy/sss_stablecoin.so --url ${{ env.CLUSTER }} --keypair ~/.config/solana/id.json 2>&1 | tee deploy1.log
          
          echo "Deploying sss_transfer_hook..."
          solana program deploy target/deploy/sss_transfer_hook.so --url ${{ env.CLUSTER }} --keypair ~/.config/solana/id.json 2>&1 | tee deploy2.log

      - name: Extract and Update Program IDs
        if: env.CLUSTER == 'devnet'
        run: |
          # Get deployed program IDs from keypair files
          SSS_PID=$(solana address -k target/deploy/sss_stablecoin-keypair.json 2>/dev/null || echo "")
          HOOK_PID=$(solana address -k target/deploy/sss_transfer_hook-keypair.json 2>/dev/null || echo "")
          
          echo "SSS Stablecoin Program: $SSS_PID"
          echo "Transfer Hook Program: $HOOK_PID"
          
          # Update Anchor.toml with deployed addresses
          if [ -n "$SSS_PID" ]; then
            sed -i "s/sss_stablecoin = \"[^\"]*\"/sss_stablecoin = \"$SSS_PID\"/" Anchor.toml
          fi
          if [ -n "$HOOK_PID" ]; then
            sed -i "s/sss_transfer_hook = \"[^\"]*\"/sss_transfer_hook = \"$HOOK_PID\"/" Anchor.toml
          fi
          
          echo "SSS_STABLECOIN_PID=$SSS_PID" >> $GITHUB_ENV
          echo "SSS_TRANSFER_HOOK_PID=$HOOK_PID" >> $GITHUB_ENV

      - name: Commit Updated Program IDs
        if: env.CLUSTER == 'devnet'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Anchor.toml
          git diff --cached --quiet || git commit -m "Update program IDs from devnet deployment [skip ci]"
          git push

      - name: Post Deployment Summary
        run: |
          echo "=== Deployment Complete ==="
          echo "Network: ${{ env.CLUSTER }}"
          echo "SSS Stablecoin: ${{ env.SSS_STABLECOIN_PID || 'See Anchor.toml' }}"
          echo "Transfer Hook: ${{ env.SSS_TRANSFER_HOOK_PID || 'See Anchor.toml' }}"
          echo ""
          echo "To verify:"
          echo "  solana program show ${{ env.SSS_STABLECOIN_PID }} --url ${{ env.CLUSTER }}"
