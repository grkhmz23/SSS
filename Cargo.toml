[workspace]
members = [
  "programs/sss-stablecoin",
  "programs/sss-transfer-hook",
  "trident-tests"
]
resolver = "2"

[workspace.dependencies]
anchor-lang = { version = "0.30.1", features = ["init-if-needed"] }
anchor-spl = { version = "0.30.1", features = ["token_2022", "token_2022_extensions", "metadata", "associated_token"] }
borsh = "0.10.4"
solana-program = "=1.18.26"
spl-token-2022 = { version = "=3.0.5", features = ["no-entrypoint"] }
spl-transfer-hook-interface = "=0.6.5"
spl-tlv-account-resolution = "=0.6.5"
spl-pod = "=0.2.5"
thiserror = "2.0.12"

[profile.release]
overflow-checks = true
lto = "fat"
codegen-units = 1
