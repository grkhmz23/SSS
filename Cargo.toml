[workspace]
members = [
  "programs/sss-stablecoin",
  "programs/sss-transfer-hook",
]
resolver = "2"

[workspace.dependencies]
anchor-lang = { version = "0.29.0", features = ["init-if-needed"] }
anchor-spl = { version = "0.29.0", features = ["token_2022", "metadata", "associated_token"] }
borsh = "0.10.3"
solana-program = "~1.17"
spl-token-2022 = { version = "1.0", features = ["no-entrypoint"] }
spl-transfer-hook-interface = "0.4"
spl-tlv-account-resolution = "0.4"
spl-pod = "0.1"
thiserror = "1.0.57"

[profile.release]
overflow-checks = true
lto = "fat"
codegen-units = 1
