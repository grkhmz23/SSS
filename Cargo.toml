[workspace]
members = [
  "programs/sss-stablecoin",
  "programs/sss-transfer-hook",
]
resolver = "2"

[workspace.dependencies]
anchor-lang = { version = "0.30.1", features = ["init-if-needed"] }
anchor-spl = { version = "0.30.1", features = ["token_2022", "token_2022_extensions", "metadata", "associated_token"] }
borsh = "0.10.3"
solana-program = "~1.18"
spl-token-2022 = { version = "4.0.0", features = ["no-entrypoint"] }
spl-transfer-hook-interface = "0.6.0"
spl-tlv-account-resolution = "0.6.0"
spl-pod = "0.2.0"
thiserror = "2.0.12"

[profile.release]
overflow-checks = true
lto = "fat"
codegen-units = 1

# Force downgrade constant_time_eq to avoid edition2024 requirement
[patch.crates-io]
constant_time_eq = { version = "=0.3.0" }
