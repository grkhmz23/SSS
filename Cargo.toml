[workspace]
members = [
  "programs/sss-stablecoin",
  "programs/sss-transfer-hook",
  "trident-tests"
]
resolver = "2"

[workspace.dependencies]
anchor-lang = { version = "0.30.1", features = ["init-if-needed"] }
anchor-spl = { version = "0.30.1", features = ["token_2022", "token_2022_extensions", "metadata", "associated_token"] }
borsh = "1.5.5"
solana-program = "1.18.26"
spl-token-2022 = { version = "3.0.4", features = ["no-entrypoint"] }
spl-transfer-hook-interface = "0.7.0"
spl-tlv-account-resolution = "0.8.1"
spl-pod = "0.3.1"
thiserror = "2.0.12"

[profile.release]
overflow-checks = true
lto = "fat"
codegen-units = 1
